<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Pong Hra - options</title>
    <link href="css/ui.css" rel="stylesheet" type="text/css">
    <link rel="icon" type="image/x-icon" href="textures/favicon_options.ico">
</head>
<body>

<canvas id="gameCanvas" width="1350" height="900"></canvas>

<div id = "optionsFrame">

    <p id="optionsTitle">Options</p>

    <p class="sectionLabel">Score to win</p>
    <div class="buttonRow">
        <button onclick="setData('scoreToWin', 3)">3</button>
        <button onclick="setData('scoreToWin', 5)">5</button>
        <button onclick="setData('scoreToWin', 10)">10</button>
    </div>

    <p class="sectionLabel">Paddle speed</p>
    <div class="buttonRow">
        <button onclick="setData('paddleSpeed', 0.5)">0.5</button>
        <button onclick="setData('paddleSpeed', 0.8)">0.8</button>
        <button onclick="setData('paddleSpeed', 1.1)">1.1</button>
    </div>

    <p class="sectionLabel">Ball speed gain (every Paddle hit)</p>
    <div class="buttonRow">
        <button onclick="setData('ballSpeedGain', 0.035)">0.035</button>
        <button onclick="setData('ballSpeedGain', 0.05)">0.05</button>
        <button onclick="setData('ballSpeedGain', 0.09)">0.09</button>
    </div>

    <button class="backButton" onclick="location.href='index.html'">Back</button>

</div>

<script src="js/options.js"></script>
<script src = "js/ui.js"></script>

</body>
</html>
